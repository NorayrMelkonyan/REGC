<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RegisCoin - Մուտք</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: radial-gradient(circle at center, #0a192f 0%, #020c1b 100%);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; color: #fff; padding: 20px;
        }
        .login-card {
            background: rgba(10, 25, 47, 0.7);
            border: 1px solid #00f2fe;
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.2);
            backdrop-filter: blur(10px);
            padding: 40px; border-radius: 16px;
            width: 100%; max-width: 400px; text-align: center;
        }
        .login-card h2 { margin-bottom: 30px; font-weight: 600; letter-spacing: 1px; color: #00f2fe; }
        .input-group { position: relative; margin-bottom: 25px; }
        .input-group input {
            width: 100%; padding: 12px 15px;
            background: rgba(2, 12, 27, 0.8);
            border: 1px solid #233554; border-radius: 8px;
            color: #fff; font-size: 16px; outline: none;
            transition: 0.3s;
        }
        .input-group input:focus { border-color: #00f2fe; box-shadow: 0 0 10px rgba(0, 242, 254, 0.3); }
        .btn-login {
            width: 100%; padding: 12px;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            border: none; border-radius: 8px; color: #020c1b;
            font-size: 16px; font-weight: bold; cursor: pointer;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 242, 254, 0.6); }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>REGIS COIN</h2>
        <form action="kayq.html">
            <div class="input-group">
                <input type="text" placeholder="Լոգին (Օգտանուն)" required>
            </div>
            <div class="input-group">
                <input type="password" placeholder="Գաղտնաբառ" required>
            </div>
            <button type="submit" class="btn-login">ՄՈՒՏՔ ԳՈՐԾԵԼ</button>
        </form>
    </div>

</body>
</html>
